name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Locale parity
        run: npm run check:locales

      - name: TypeScript
        # Pre-existing /event routes have stale imports that we don't
        # block CI on — filter those out, fail on anything else.
        run: |
          set -o pipefail
          OUT=$(npx tsc --noEmit 2>&1 | grep -vE "src/app/\[lang\]/event/" || true)
          if [ -n "$OUT" ]; then
            echo "$OUT"
            echo "::error::TypeScript errors above (outside /event)"
            exit 1
          fi

      - name: Lint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Runs after the lightweight checks so a typo doesn't burn 5 minutes
    # of browser install before we discover it.
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build site
        env:
          ADMIN_PASSWORD: ci-test-password
        run: npm run build

      - name: Run Playwright tests
        env:
          ADMIN_PASSWORD: ci-test-password
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
